name: Release probes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 32-bit MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build probe ASI
        run: make -C probes/probe-asi STRIP_MINGW=i686-w64-mingw32-strip

      - name: Stage release files
        run: |
          mkdir dist
          cp probes/probe-asi/probe_marker.asi dist/
          cp probes/probe-lua/probe_marker.lua dist/
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.asi
            dist/*.lua
