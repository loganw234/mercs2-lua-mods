name: Release probes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 32-bit MinGW cross-compiler + zip
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 zip

      - name: Build probe ASI (control)
        run: make -C probes/probe-asi STRIP_MINGW=i686-w64-mingw32-strip

      - name: Package manifest probes as zips
        run: |
          mkdir -p dist
          cp probes/probe-asi/probe_marker.asi dist/

          # Each manifest probe: zip its whole folder contents (manifest.json
          # + any accompanying assets) into a single release archive. Zips
          # are named after the mod slug so repository.json's `assets` list
          # matches 1:1.
          for probe in probe-manifest-empty probe-manifest-name-only probe-manifest-minimal probe-manifest-sample; do
            if [ -d "probes/$probe" ]; then
              (cd "probes/$probe" && zip -r "../../dist/$probe.zip" .)
            fi
          done

          echo "--- dist contents ---"
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.asi
            dist/*.zip
